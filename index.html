<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="main">
      <header class="navbar group hover:shadow-xl">
        <div class="logo">O/M</div>

        <div class="menu group-hover:h-5"></div>

        <button class="btn group">
          <p>Book a Call</p>
          <i class="ri-arrow-right-line group-hover:translate-x-1"></i>
        </button>
      </header>

      <section class="hero">
        <div class="hero-img">
          <h1>Designing Brands and Interfaces</h1>
          <h1>Worth Remembering</h1>

          <div class="btn-container">
            <button class="btn-black">
              Get Started<i
                class="ri-arrow-right-line group-hover:translate-x-1"
              ></i>
            </button>
            <button class="btn-white">
              View Pricing<i
                class="ri-arrow-right-line group-hover:translate-x-1"
              ></i>
            </button>
          </div>
        </div>
        <div class="marquee">
          <p>
            Trusted by world's<br />
            most exciting brands
          </p>
          <div class="marquee-container">
            <img src="https://www.offmenu.design/logos/utility.svg" alt="" />
            <img src="https://www.offmenu.design/logos/achieve.svg" alt="" />
            <img src="https://www.offmenu.design/logos/superintelligent.svg" alt="" />
            <img src="https://www.offmenu.design/logos/ditto.svg" alt="" />
            <img src="https://www.offmenu.design/logos/closetnow.svg" alt="" />
            <img src="https://www.offmenu.design/logos/obscura.svg" alt="" />
            <img src="https://www.offmenu.design/logos/midfunnel.svg" alt="" />
            <img src="https://www.offmenu.design/logos/momentum.svg" alt="" />
            <img src="https://www.offmenu.design/logos/tangent.svg" alt="" />
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
